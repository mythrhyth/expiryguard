version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: expiryguard_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword123
      POSTGRES_DB: expiryguard_db
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: expiryguard_backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - DATABASE_URL=postgresql://postgres:postgrespassword123@db:5432/expiryguard_db?schema=public
      - JWT_ACCESS_SECRET=expiryguard_prod_access_secret_key_99999
      - JWT_REFRESH_SECRET=expiryguard_prod_refresh_secret_key_88888
      - JWT_ACCESS_EXPIRY=15m
      - JWT_REFRESH_EXPIRY=7d
      - UPLOAD_DIR=uploads
      - CLIENT_URL=http://localhost:5173
      - NODE_ENV=production
    depends_on:
      - db
    volumes:
      - uploads_data:/app/uploads
    # Wait for DB to spin up, push schema to DB, seed it, and start Express
    entrypoint: >
      sh -c "
        echo 'Waiting for database...' &&
        sleep 5 &&
        npx prisma db push --accept-data-loss &&
        npx prisma db seed &&
        node dist/src/app.js
      "

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: expiryguard_frontend
    restart: always
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:5000/api
    depends_on:
      - backend

volumes:
  pgdata:
  uploads_data:
